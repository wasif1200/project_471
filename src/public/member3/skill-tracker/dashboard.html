<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillPath — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d0d14;
      --paper: #f5f3ee;
      --accent: #4f46e5;
      --accent-light: #eef2ff;
      --accent2: #06b6d4;
      --gold: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --muted: #6b7280;
      --muted-light: #9ca3af;
      --card: #ffffff;
      --border: #e5e2db;
      --sidebar-w: 240px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── TOP NAV ── */
    .topnav {
      height: 60px;
      background: var(--ink);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topnav-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: white;
      flex: 1;
    }

    .topnav-logo span { color: var(--accent2); }

    .back-btn {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-btn:hover { color: white; }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: calc(100vh - 60px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 28px 20px;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .sidebar-student {
      text-align: center;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-avatar {
      width: 64px; height: 64px;
      border-radius: 18px;
      background: var(--ink);
      color: var(--paper);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin: 0 auto 12px;
    }

    .sidebar-name {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .sidebar-major {
      font-size: 12px;
      color: var(--muted);
    }

    .sidebar-nav { list-style: none; }
    .sidebar-nav li a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      transition: all 0.15s;
      margin-bottom: 2px;
    }
    .sidebar-nav li a:hover, .sidebar-nav li a.active {
      background: var(--accent-light);
      color: var(--accent);
    }
    .sidebar-nav .icon { font-size: 16px; }

    /* ── MAIN ── */
    .main {
      padding: 32px;
      overflow-x: hidden;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .page-subtitle { color: var(--muted); font-size: 14px; }

    /* ── SUMMARY CARDS ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: box-shadow 0.2s;
    }

    .summary-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }

    .summary-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      margin-bottom: 12px;
    }

    .icon-blue { background: #dbeafe; }
    .icon-purple { background: #ede9fe; }
    .icon-gold { background: #fef3c7; }
    .icon-green { background: #d1fae5; }

    .summary-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }

    .summary-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── SECTION TITLES ── */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── CHARTS ROW ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .chart-card.full { grid-column: 1 / -1; }

    .chart-label {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .chart-wrap { position: relative; width: 100%; }
    .chart-wrap canvas { max-width: 100%; }

    /* ── SKILLS GRID ── */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .skill-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      transition: all 0.2s;
    }

    .skill-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.07); }

    .skill-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .skill-icon-name { display: flex; align-items: center; gap: 8px; }
    .skill-emoji { font-size: 20px; }
    .skill-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
    .skill-category { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .skill-level-badge {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 100px;
    }

    .level-1 { background: #fee2e2; color: #b91c1c; }
    .level-2 { background: #fef3c7; color: #b45309; }
    .level-3 { background: #e0f2fe; color: #0369a1; }
    .level-4 { background: #d1fae5; color: #047857; }
    .level-5 { background: #ede9fe; color: #6d28d9; }

    .skill-progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
    }

    .skill-progress-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.8s ease;
      background: linear-gradient(to right, var(--accent), var(--accent2));
    }

    .skill-level-text { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* ── COURSES ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }

    .courses-list { display: flex; flex-direction: column; gap: 10px; }

    .course-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: box-shadow 0.2s;
    }

    .course-item:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.06); }

    .course-dot {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .course-name { font-size: 13px; font-weight: 500; }
    .course-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .course-date {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── AVAILABLE COURSES ── */
    .available-course {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .complete-btn {
      margin-left: auto;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .complete-btn:hover { background: #4338ca; transform: scale(1.03); }
    .complete-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

    /* ── INSIGHTS ── */
    .insights-list { display: flex; flex-direction: column; gap: 10px; }

    .insight-item {
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 0 12px 12px 0;
      font-size: 14px;
      line-height: 1.5;
      animation: slideIn 0.4s ease both;
    }

    @keyframes slideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:none; } }

    /* ── TIMELINE ── */
    .timeline { position: relative; padding-left: 24px; }
    .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--border); }

    .timeline-item {
      position: relative;
      margin-bottom: 20px;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -20px;
      top: 18px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--paper);
    }

    .timeline-title { font-size: 13px; font-weight: 500; }
    .timeline-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--ink);
      color: white;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      max-width: 340px;
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    /* ── LOADING STATE ── */
    .loading-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      flex-direction: column;
      gap: 16px;
      color: var(--muted);
    }

    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-grid, .two-col { grid-template-columns: 1fr; }
    }

    @media (max-width: 520px) {
      .summary-grid { grid-template-columns: 1fr 1fr; }
      .main { padding: 16px; }
    }
  </style>
  <link rel="stylesheet" href="/member3/member3-theme.css">
</head>
<body>

  <!-- Top Nav -->
  <nav class="topnav">
    <div class="topnav-logo">Skill<span>Path</span></div>
    <a href="/member3/skill-tracker" class="back-btn">← All Students</a>
  </nav>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-student">
        <div class="sidebar-avatar" id="sidebarAvatar">--</div>
        <div class="sidebar-name" id="sidebarName">Loading...</div>
        <div class="sidebar-major" id="sidebarMajor">—</div>
      </div>
      <ul class="sidebar-nav">
        <li><a href="#overview" class="active"><span class="icon">📊</span> Overview</a></li>
        <li><a href="#skills"><span class="icon">⚡</span> My Skills</a></li>
        <li><a href="#charts"><span class="icon">📈</span> Progress Charts</a></li>
        <li><a href="#courses"><span class="icon">🎓</span> Courses</a></li>
        <li><a href="#insights"><span class="icon">💡</span> Insights</a></li>
        <li><a href="#timeline"><span class="icon">🗓️</span> Timeline</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main" id="mainContent">
      <div class="loading-overlay">
        <div class="spinner"></div>
        <div>Loading your dashboard...</div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Get student ID from URL
    const studentId = window.location.pathname.split('/').pop();
    let progressData = null;
    let charts = {};

    // ── FETCH DATA ──
    async function loadDashboard() {
      try {
        const res = await fetch(`/member3/api/students/${studentId}/progress`);
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        progressData = json.data;
        renderDashboard(progressData);
      } catch (e) {
        document.getElementById('mainContent').innerHTML = `
          <div class="loading-overlay">
            <div>⚠️ Failed to load data: ${e.message}</div>
          </div>`;
      }
    }

    // ── RENDER DASHBOARD ──
    function renderDashboard(d) {
      const { student, summary, skills, completedCourses, availableCourses, charts: chartData, insights } = d;

      // Sidebar
      document.getElementById('sidebarAvatar').textContent = student.avatarInitials;
      document.getElementById('sidebarName').textContent = student.name;
      document.getElementById('sidebarMajor').textContent = `${student.major}`;

      // Build main HTML
      document.getElementById('mainContent').innerHTML = `
        <div id="overview">
          <div class="page-header">
            <div>
              <div class="page-title">Welcome back, ${student.name.split(' ')[0]} 👋</div>
              <div class="page-subtitle">${student.major} · Enrolled ${student.enrollmentYear}</div>
            </div>
          </div>

          <!-- Summary Cards -->
          <div class="summary-grid">
            <div class="summary-card">
              <div class="summary-icon icon-blue">⚡</div>
              <div class="summary-value">${summary.totalSkills}</div>
              <div class="summary-label">Total Skills</div>
            </div>
            <div class="summary-card">
              <div class="summary-icon icon-purple">📊</div>
              <div class="summary-value">${summary.avgLevel}</div>
              <div class="summary-label">Avg Skill Level</div>
            </div>
            <div class="summary-card">
              <div class="summary-icon icon-gold">🎓</div>
              <div class="summary-value">${summary.totalCompleted}</div>
              <div class="summary-label">Courses Done</div>
            </div>
            <div class="summary-card">
              <div class="summary-icon icon-green">🚀</div>
              <div class="summary-value" style="font-size:1.1rem;margin-top:4px;">${summary.mostImproved || '—'}</div>
              <div class="summary-label">Most Improved</div>
            </div>
          </div>
        </div>

        <!-- Charts -->
        <div id="charts">
          <div class="section-title">Progress Charts</div>
          <div class="charts-grid">
            <div class="chart-card">
              <div class="chart-label">Current Skill Levels</div>
              <div class="chart-wrap" style="height:260px"><canvas id="barChart"></canvas></div>
            </div>
            <div class="chart-card">
              <div class="chart-label">Skill Profile Radar</div>
              <div class="chart-wrap" style="height:260px"><canvas id="radarChart"></canvas></div>
            </div>
            <div class="chart-card full">
              <div class="chart-label">Skill Growth Over Time</div>
              <div class="chart-wrap" style="height:280px"><canvas id="lineChart"></canvas></div>
            </div>
          </div>
        </div>

        <!-- Skills -->
        <div id="skills">
          <div class="section-title">My Skills</div>
          <div class="skills-grid">
            ${skills.map(s => `
              <div class="skill-card">
                <div class="skill-top">
                  <div class="skill-icon-name">
                    <span class="skill-emoji">${s.icon}</span>
                    <div>
                      <div class="skill-name">${s.name}</div>
                      <div class="skill-category">${s.category}</div>
                    </div>
                  </div>
                  <span class="skill-level-badge level-${s.level}">Lv ${s.level}</span>
                </div>
                <div class="skill-progress-bar">
                  <div class="skill-progress-fill" style="width:${(s.level/5)*100}%"></div>
                </div>
                <div class="skill-level-text">${s.level}/5 — ${['Beginner','Novice','Intermediate','Advanced','Expert'][s.level-1]}</div>
              </div>
            `).join('')}
          </div>
        </div>

        <!-- Courses + Available -->
        <div id="courses">
          <div class="section-title">Courses</div>
          <div class="two-col">
            <div>
              <div style="font-weight:600;font-size:14px;margin-bottom:12px;color:var(--muted);">COMPLETED</div>
              <div class="courses-list">
                ${completedCourses.length ? completedCourses.map(c => `
                  <div class="course-item">
                    <div class="course-dot">${c.skillIcon}</div>
                    <div>
                      <div class="course-name">${c.courseTitle}</div>
                      <div class="course-meta">${c.skillName} · ${c.duration}</div>
                    </div>
                    <div class="course-date">${formatDate(c.completedAt)}</div>
                  </div>
                `).join('') : '<div style="color:var(--muted);font-size:14px;padding:12px">No courses completed yet.</div>'}
              </div>
            </div>
            <div>
              <div style="font-weight:600;font-size:14px;margin-bottom:12px;color:var(--muted);">AVAILABLE TO TAKE</div>
              ${availableCourses.map(c => `
                <div class="available-course">
                  <div class="course-dot">${c.skillIcon}</div>
                  <div>
                    <div class="course-name">${c.title}</div>
                    <div class="course-meta">${c.skillName} · ${c.duration}</div>
                  </div>
                  <button class="complete-btn" onclick="completeCourse(${c.id}, this)" data-id="${c.id}">
                    ✓ Complete
                  </button>
                </div>
              `).join('') || '<div style="color:var(--muted);font-size:14px;padding:12px">All courses completed! 🎉</div>'}
            </div>
          </div>
        </div>

        <!-- Insights -->
        <div id="insights">
          <div class="section-title">Learning Insights</div>
          <div class="insights-list">
            ${insights.map((ins, i) => `
              <div class="insight-item" style="animation-delay:${i*0.1}s">${ins}</div>
            `).join('')}
          </div>
        </div>

        <!-- Timeline -->
        <div id="timeline" style="margin-top:32px">
          <div class="section-title">Learning Timeline</div>
          <div class="timeline">
            ${completedCourses.map(c => `
              <div class="timeline-item">
                <div class="timeline-title">${c.skillIcon} Completed: ${c.courseTitle}</div>
                <div class="timeline-meta">${c.skillName} · ${formatDate(c.completedAt)}</div>
              </div>
            `).join('') || '<div style="color:var(--muted);font-size:14px;padding:12px">No activity yet.</div>'}
          </div>
        </div>
      `;

      // Build charts
      buildBarChart(chartData.barChartData);
      buildRadarChart(chartData.radarChartData);
      buildLineChart(chartData.lineChartData);
    }

    // ── CHARTS ──
    const COLORS = ['#4f46e5','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#6366f1'];

    function buildBarChart(data) {
      const ctx = document.getElementById('barChart');
      if (!ctx) return;
      if (charts.bar) charts.bar.destroy();
      charts.bar = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.labels,
          datasets: [{
            label: 'Skill Level',
            data: data.data,
            backgroundColor: COLORS,
            borderRadius: 8,
            borderSkipped: false,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { min: 0, max: 5, ticks: { stepSize: 1 }, grid: { color: '#f0ede8' } },
            x: { grid: { display: false } }
          }
        }
      });
    }

    function buildRadarChart(data) {
      const ctx = document.getElementById('radarChart');
      if (!ctx) return;
      if (charts.radar) charts.radar.destroy();
      charts.radar = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: data.labels,
          datasets: [{
            label: 'Skill Profile',
            data: data.data,
            backgroundColor: 'rgba(79,70,229,0.15)',
            borderColor: '#4f46e5',
            pointBackgroundColor: '#4f46e5',
            pointRadius: 4,
            borderWidth: 2,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            r: {
              min: 0, max: 5,
              ticks: { stepSize: 1, font: { size: 10 } },
              grid: { color: '#e5e2db' },
              pointLabels: { font: { size: 11, family: 'Syne' } }
            }
          }
        }
      });
    }

    function buildLineChart(lineData) {
      const ctx = document.getElementById('lineChart');
      if (!ctx) return;
      if (charts.line) charts.line.destroy();

      const skillNames = Object.keys(lineData);
      if (!skillNames.length) {
        ctx.parentElement.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:20px;text-align:center">No progress history yet. Complete some courses!</div>';
        return;
      }

      // Collect all unique dates
      const allDates = [...new Set(
        skillNames.flatMap(n => lineData[n].map(p => p.date))
      )].sort();

      const datasets = skillNames.map((name, i) => {
        const points = lineData[name];
        const dataMap = {};
        points.forEach(p => dataMap[p.date] = p.level);
        return {
          label: name,
          data: allDates.map(d => dataMap[d] ?? null),
          borderColor: COLORS[i % COLORS.length],
          backgroundColor: COLORS[i % COLORS.length] + '20',
          tension: 0.4,
          spanGaps: true,
          pointRadius: 5,
          pointHoverRadius: 7,
          borderWidth: 2,
          fill: false,
        };
      });

      charts.line = new Chart(ctx, {
        type: 'line',
        data: { labels: allDates, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top', labels: { font: { family: 'DM Sans', size: 12 }, padding: 16 } }
          },
          scales: {
            y: { min: 0, max: 5, ticks: { stepSize: 1 }, grid: { color: '#f0ede8' } },
            x: { grid: { display: false } }
          }
        }
      });
    }

    // ── COMPLETE COURSE ──
    async function completeCourse(courseId, btn) {
      btn.disabled = true;
      btn.textContent = '...';
      try {
        const res = await fetch(`/member3/api/students/${studentId}/complete-course`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ courseId })
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);

        showToast(`🎉 ${json.message}`);
        btn.textContent = '✓ Done';
        btn.style.background = 'var(--green)';

        // Reload after a short delay
        setTimeout(() => loadDashboard(), 1500);
      } catch (e) {
        showToast(`⚠️ ${e.message}`, true);
        btn.disabled = false;
        btn.textContent = '✓ Complete';
      }
    }

    // ── HELPERS ──
    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? '#ef4444' : '#0d0d14';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    // ── SMOOTH SCROLL NAV ──
    document.addEventListener('click', e => {
      if (e.target.closest('.sidebar-nav a')) {
        document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
        e.target.closest('a').classList.add('active');
      }
    });

    loadDashboard();
  </script>
</body>
</html>
