<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillTracker — Student Skill Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/member3/member3-theme.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d0d14;
      --paper: #f5f3ee;
      --accent: #4f46e5;
      --accent2: #06b6d4;
      --gold: #f59e0b;
      --green: #10b981;
      --muted: #6b7280;
      --card: #ffffff;
      --border: #e5e2db;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* Hero */
    .hero {
      background: var(--ink);
      color: var(--paper);
      padding: 80px 40px 100px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(79,70,229,0.4) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 20px;
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 20px;
    }

    .hero h1 span { color: var(--accent2); }

    .hero p {
      font-size: 1.1rem;
      color: rgba(245,243,238,0.7);
      max-width: 500px;
      line-height: 1.7;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 32px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px;
      padding: 8px 18px;
      font-size: 13px;
      color: rgba(245,243,238,0.8);
    }

    .hero-badge .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }

    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }

    /* Main content */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 32px;
    }

    .section-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
    }

    .section-header .count {
      font-size: 13px;
      color: var(--muted);
      background: var(--border);
      padding: 3px 10px;
      border-radius: 100px;
    }

    /* Student cards grid */
    .students-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .student-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .student-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.1);
      border-color: var(--accent);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .avatar {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: var(--ink);
      color: var(--paper);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .avatar.blue { background: #dbeafe; color: #1d4ed8; }
    .avatar.purple { background: #ede9fe; color: #7c3aed; }
    .avatar.teal { background: #ccfbf1; color: #0f766e; }

    .card-name { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
    .card-major { font-size: 13px; color: var(--muted); margin-top: 2px; }

    .card-stats {
      display: flex;
      gap: 0;
    }

    .stat {
      flex: 1;
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }

    .stat:not(:last-child) { border-right: 1px solid var(--border); padding-right: 16px; margin-right: 16px; }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
    }

    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    .view-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      padding: 10px 0;
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      transition: all 0.2s;
    }

    .student-card:hover .view-btn {
      background: var(--accent);
      color: white;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <div class="hero">
    <div style="max-width:1100px;margin:0 auto;">
      <h1>Track Your <span>Skill</span><br>Growth Journey</h1>
      <p>Monitor skill progression, complete learning courses, and visualize how your abilities grow over time.</p>
      <div class="hero-badge">
        <div class="dot"></div>
        Internship + Skill Gap Analyzer
      </div>
    </div>
  </div>

  <div class="container">
    <div class="section-header">
      <h2>Select Student Profile</h2>
      <span class="count" id="studentCount">Loading...</span>
    </div>

    <div class="students-grid" id="studentsGrid">
      <div class="loading">
        <div class="spinner"></div>
        <div>Loading students...</div>
      </div>
    </div>
  </div>



  <script>
    const avatarColors = ['blue', 'purple', 'teal'];

    async function loadStudents() {
      try {
        const res = await fetch('/member3/api/students');
        const { data } = await res.json();

        document.getElementById('studentCount').textContent = `${data.length} students`;

        const grid = document.getElementById('studentsGrid');
        grid.innerHTML = data.map((s, i) => `
          <a class="student-card" href="/member3/dashboard/${s.id}">
            <div class="card-top">
              <div class="avatar ${avatarColors[i % 3]}">${s.avatarInitials}</div>
              <div>
                <div class="card-name">${s.name}</div>
                <div class="card-major">${s.major} · ${s.enrollmentYear}</div>
              </div>
            </div>
            <div class="card-stats">
              <div class="stat">
                <div class="stat-value">${s.totalSkills}</div>
                <div class="stat-label">Skills</div>
              </div>
              <div class="stat">
                <div class="stat-value">${s.completedCourses}</div>
                <div class="stat-label">Courses Done</div>
              </div>
            </div>
            <div class="view-btn">View Dashboard →</div>
          </a>
        `).join('');
      } catch (e) {
        document.getElementById('studentsGrid').innerHTML = `<div class="loading">⚠️ Could not load students. Is the server running?</div>`;
      }
    }

    loadStudents();
  </script>
</body>
</html>
