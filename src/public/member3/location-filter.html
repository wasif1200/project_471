<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Internship Location Finder | Module 3</title>
  <link rel="stylesheet" href="/member3/member3-theme.css">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    body { background: #f1f5f9; }
    #map { height: 420px; border-radius: 14px; z-index: 0; }
    .card { background: white; border-radius: 16px; box-shadow: 0 2px 20px rgba(0,0,0,0.07); }
    .badge-remote { background: #dbeafe; color: #1d4ed8; }
    .badge-city   { background: #dcfce7; color: #15803d; }
    .result-card  { transition: transform 0.15s, box-shadow 0.15s; cursor: pointer; }
    .result-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.1); }
    .nav-link { transition: color 0.15s; }
    .nav-link:hover { color: #2563eb; }
    .spinner { border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; width: 28px; height: 28px; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen">

  <!-- Navbar -->
  <nav class="px-6 py-4 flex items-center justify-between mb-6 style="background:#0f172a;">
    <div class="flex items-center gap-3">
      
      <span class="font-bold text-gray-800">Internship Analyzer</span>

      
    </div>
    <div class="flex gap-6 text-sm font-medium text-gray-600">
      <a href="/member3/location" class="nav-link text-blue-600 border-b-2 border-blue-600 pb-0.5">📍 Location Filter</a>
      <a href="/member3/certificate" class="nav-link">🎓 Certificates</a>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-4 pb-10">

    <!-- Header -->
    <div class="mb-6">
      <h1 class="text-3xl font-bold text-gray-800">📍 Internship Location Finder</h1>
      <p class="text-gray-500 mt-1">Filter internships by city or remote work — and see them live on the map.</p>
    </div>

    <!-- Stats Row -->
    <div class="grid grid-cols-3 gap-4 mb-6" id="statsRow">
      <div class="card p-4 text-center">
        <p class="text-3xl font-bold text-blue-600" id="statTotal">—</p>
        <p class="text-xs text-gray-500 mt-1">Total Internships</p>
      </div>
      <div class="card p-4 text-center">
        <p class="text-3xl font-bold text-green-600" id="statRemote">—</p>
        <p class="text-xs text-gray-500 mt-1">Remote</p>
      </div>
      <div class="card p-4 text-center">
        <p class="text-3xl font-bold text-amber-600" id="statCities">—</p>
        <p class="text-xs text-gray-500 mt-1">Cities</p>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="card p-5 mb-6 flex flex-wrap gap-4 items-end">
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Filter by City</label>
        <select id="cityFilter" class="border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 min-w-40">
          <option value="">All Cities</option>
        </select>
      </div>
      <div class="flex items-center gap-2 pb-1">
        <input type="checkbox" id="remoteToggle" class="w-4 h-4 accent-blue-600"/>
        <label for="remoteToggle" class="text-sm font-medium text-gray-600">Remote Only</label>
      </div>
      <button onclick="applyFilter()" class="bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 transition">
        🔍 Search
      </button>
      <button onclick="resetFilter()" class="bg-gray-100 text-gray-600 px-6 py-2 rounded-lg text-sm font-semibold hover:bg-gray-200 transition">
        ↺ Reset
      </button>
    </div>

    <!-- Map + Results -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- Map -->
      <div class="card p-4">
        <h2 class="font-semibold text-gray-700 mb-3 flex items-center gap-2">
          🗺️ Map View
          <span class="text-xs text-gray-400 font-normal">Click a result to zoom</span>
        </h2>
        <div id="map"></div>
        <p class="text-xs text-gray-400 mt-2">📌 Remote internships are not shown on map</p>
      </div>

      <!-- Results -->
      <div>
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-semibold text-gray-700">
            Results <span id="resultCount" class="text-blue-600 font-bold"></span>
          </h2>
          <div id="loadingSpinner" class="spinner hidden"></div>
        </div>
        <div id="resultsList" class="space-y-4 max-h-96 overflow-y-auto pr-1"></div>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([23.8103, 90.4125], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    let markers = [];
    let allData = [];

    async function loadCities() {
      const res = await fetch('/member3/api/internships/cities');
      const json = await res.json();
      const select = document.getElementById('cityFilter');
      json.data.forEach(city => {
        if (city !== 'Remote') {
          const opt = document.createElement('option');
          opt.value = city;
          opt.textContent = city;
          select.appendChild(opt);
        }
      });
    }

    async function loadInternships(params = '') {
      document.getElementById('loadingSpinner').classList.remove('hidden');
      try {
        const res = await fetch(`/member3/api/internships?${params}`);
        const json = await res.json();
        allData = json.data;
        updateStats(allData);
        renderResults(allData);
        renderMarkers(allData);
      } catch (e) {
        document.getElementById('resultsList').innerHTML =
          '<p class="text-red-500 text-sm">❌ Failed to load. Is the server running?</p>';
      }
      document.getElementById('loadingSpinner').classList.add('hidden');
    }

    function updateStats(data) {
      document.getElementById('statTotal').textContent = data.length;
      document.getElementById('statRemote').textContent = data.filter(i => i.isRemote).length;
      const cities = new Set(data.filter(i => !i.isRemote).map(i => i.city));
      document.getElementById('statCities').textContent = cities.size;
    }

    function renderResults(data) {
      const list = document.getElementById('resultsList');
      document.getElementById('resultCount').textContent = `(${data.length})`;
      if (!data.length) {
        list.innerHTML = '<div class="text-center py-8 text-gray-400"><p class="text-4xl mb-2">🔍</p><p>No internships found.</p></div>';
        return;
      }
      list.innerHTML = data.map(i => `
        <div class="card p-4 result-card" onclick="focusMap(${i.latitude}, ${i.longitude})">
          <div class="flex justify-between items-start gap-2">
            <div>
              <h3 class="font-bold text-gray-800 text-sm">${i.title}</h3>
              <p class="text-xs text-gray-500 mt-0.5">${i.company}</p>
            </div>
            <span class="text-xs px-2 py-1 rounded-full font-semibold whitespace-nowrap ${i.isRemote ? 'badge-remote' : 'badge-city'}">
              ${i.isRemote ? '🌐 Remote' : '📍 ' + i.city}
            </span>
          </div>
          <p class="text-xs text-gray-500 mt-2 line-clamp-2">${i.description || ''}</p>
          <div class="mt-2 flex flex-wrap gap-1">
            ${(i.requirements || []).map(r =>
              `<span class="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full">${r.skill.name}</span>`
            ).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderMarkers(data) {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      data.filter(i => !i.isRemote && i.latitude && i.longitude).forEach(i => {
        const m = L.marker([i.latitude, i.longitude])
          .addTo(map)
          .bindPopup(`<b>${i.title}</b><br/><span style="color:#6b7280">${i.company}</span><br/><span style="color:#3b82f6">📍 ${i.city}</span>`);
        markers.push(m);
      });
    }

    function focusMap(lat, lng) {
      if (lat && lng) {
        map.setView([lat, lng], 14);
        markers.forEach(m => {
          if (Math.abs(m.getLatLng().lat - lat) < 0.01) m.openPopup();
        });
      }
    }

    function applyFilter() {
      const city = document.getElementById('cityFilter').value;
      const remote = document.getElementById('remoteToggle').checked;
      let params = '';
      if (remote) params = 'remote=true';
      else if (city) params = `city=${encodeURIComponent(city)}`;
      loadInternships(params);
    }

    function resetFilter() {
      document.getElementById('cityFilter').value = '';
      document.getElementById('remoteToggle').checked = false;
      loadInternships();
    }

    loadCities();
    loadInternships();
  </script>
</body>
</html>
